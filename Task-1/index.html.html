<!DOCTYPE html>
<html>
<head>
<title>Register Form</title>
</head>

<body align ="center">

<h1><i>User Registration Form</i></h1>

<form action="login.html">

<i>Name</i><br>
<input type="text" name="name" required><br><br>

<i>Email</i><br>
<input type="email" name="email" required><br><br>

<i>Password</i><br>
<input type="password" name="password" required><br><br>

<i>Mobile Number</i><br>
<input type="tel" name="mobile" required><br><br>

<i>Address</i><br>
<textarea rows="4" cols="30"></textarea><br><br>

<i>Gender</i><br>
<input type="radio" name="gender"> <i>Male</i>
<input type="radio" name="gender"> <i>Female</i>
<input type="radio" name="gender"> <i>Other</i>
<br><br>

<i>Profile Picture</i><br>
<input type="file"><br><br>

<i>City</i><br>
<select>
<option>Hyderabad</option>
<option>Chennai</option>
<option>Bangalore</option>
<option>Mumbai</option>
</select>
<br><br>

<i>Education</i><br>
<select>
<option>10th</option>
<option>Inter</option>
<option>Diploma</option>
<option>B.Tech</option>
</select>

<br><br>

<input type="submit" value="Register">

</form>


</body>
</html>
